	<div class="poem">
	<h1>Ківтень</h1>
	<h2>Ківтень у фотографіях</h2>
	<img src="img/as.jpg">
	<img src="img/mn.jpg">
	<img src="img/op.jpg">
	<p>Сині проліски привітно
	Зводять вінчики малі.<br>
	І хоч, може буде влітку<br>
	Більше квітів запашних,<br>
	Та для нас найперша квітка<br>
	Наймиліша від усіх.<br>
	<p>Завжди ми її помітим,
	З лісу в дім принесемо.<br>
	І тому цей місяць Квітнем<br>
	По заслузі ми звемо.<br>
