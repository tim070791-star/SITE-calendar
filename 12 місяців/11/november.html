<body>
	<h1>Листопад</h1>
	<h3>Листопад у фотографіях</h3>
	<div class="image">
	<img src="img/листопад1.jpg">
	<img src="img/листопад2.jpg">
	<img src="img/листопад3.jpg">
	<h3>Листопад — мов зорепад</h3>
	<div class="poem">
		<p>
			Листопад – мов зорепад. <br>
			Жовті та червоні <br>
			сипле айстрів пелюстки <br>
			щедро у долоні. <br>
		</p>
		<p>
			І намисто одяга, <br>
			мов дівча, калина. <br>
			З неба хмарка вигляда: <br>
			вітерця чи стріну? <br>
		</p>
		<p>
		Під ногами шарудить <br>
		листя золотаве. <br>
		Добре мріється мені <br>
		з ароматом кави!<br>
		</p>
</div>
</body>
</html>
