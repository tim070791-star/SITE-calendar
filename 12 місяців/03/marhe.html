	<p>Зiйшли снiги, шумить вода,
	Весною повiва<br>
	Земля квiточки викида,<br>
	Буяє травка молода<br>
	Все мертве ожива.<br>
	<p>Веселе сонечко блистить,
	Промiння щедро ллє<br>
	Гайок привiтно шелестить,<br>
	Неначе кличе пригостить<br>
	Струмочок виграє…<br>
