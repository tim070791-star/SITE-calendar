<body>
	<h1>Грудень</h1>
	<h3>Грудень у фотографіях</h3>
	<div class="image">
	<img src="img/грудень1.jpg">
	<img src="img/грудень2.jpg">
	<img src="img/грудень3.jpg">
	<h3></h3>
	<div class="poem">
		<p>Грудень тихо наступає,<br>
		Землю снігом посипає.<br>
		Подивись лишень сюди<br>
		Та це ж зайчика сліди.</p>
		<p>Де ж наш сірий заховався?<br>
		Він у білу шубку вбрався.<br>
		Більше зайчик не боїться<br>
		Ні вовчиська, ні лисиці.</p>
</div>
