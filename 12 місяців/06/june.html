 <!DOCTYPE html>
<html>
	<head>
		<title>Лютий</title>
	<link rel="stylesheet" href="style.css">
	<title>Червень</title>
</head>
<body>
	<div class="container">
		<h1>Червень</h1>
		<h2>Червень у фотографіях</h2>
		<img src="img/cool.jpg" alt="Лютий">
		<img src="img/cr.jpg" alt="Лютий">
		<img src="img/zel.jpg" alt="Снег">
		<h3>Шостий місяць зветься Червень</h3>
		<p>В золотій хустинці<br>
		Дорогі гостинці<br>
		Червень нам принісЯгоди-суниці<br>
		В лісі у травиці<br>
		Розсипає скрізь.</p>
		<p>І чомусь здається –<br>
		Все навкруг сміється:<br>
		Лукигайріка.<br>
		Ловимо в долоні<br>
		Промінці червоні –<br>
		Ойтеплінь яка!</p>
	</div>
</body>
</html>
